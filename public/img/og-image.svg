<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081020"/>
      <stop offset="100%" style="stop-color:#0c1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb4f5"/>
      <stop offset="50%" style="stop-color:#a8d4f0"/>
      <stop offset="100%" style="stop-color:#7ecfc0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Accent line top -->
  <rect x="60" y="60" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Title -->
  <text x="60" y="180" fill="#e4eaf5" font-family="monospace" font-size="72" font-weight="bold">&gt; NEO_</text>
  <!-- Subtitle -->
  <text x="60" y="240" fill="#9eb3cf" font-family="sans-serif" font-size="28">Self-Hosted AI auf Custom Hardware</text>
  <!-- Stats -->
  <text x="60" y="320" fill="#7eb4f5" font-family="monospace" font-size="22">16 Services · 15 Automationen · 11 KI-Modelle</text>
  <text x="60" y="360" fill="#7ecfc0" font-family="monospace" font-size="22">€200 Hardware · $0.12/Tag · 0 Cloud-Kosten</text>
  <!-- Orbs (decorative circles) -->
  <circle cx="950" cy="200" r="120" fill="#7eb4f5" opacity="0.06"/>
  <circle cx="1050" cy="350" r="80" fill="#a8d4f0" opacity="0.05"/>
  <circle cx="900" cy="400" r="60" fill="#7ecfc0" opacity="0.04"/>
  <!-- Bottom bar -->
  <text x="60" y="540" fill="#4e6382" font-family="monospace" font-size="18">neo.lietztech.com · Merlin Lietz · März 2026</text>
  <!-- Accent line bottom -->
  <rect x="60" y="560" width="1080" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
